<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iPhone Store</title>

<style>
body{
  margin:0;
  background:#d8cfc1;
  font-family:-apple-system, Arial;
  display:flex;
  justify-content:center;
  padding:20px;
}

/* PHONE */
.phone{
  width:370px;
  height:760px;
  background:#111;
  border-radius:45px;
  padding:14px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
}

.screen{
  width:100%;
  height:100%;
  background:#f5f5f7;
  border-radius:35px;
  overflow:hidden;
  position:relative;
}

/* TOP */
.topbar{
  background:#1b2a41;
  color:#ff8c2a;
  text-align:center;
  padding:14px;
  font-weight:800;
}

/* LIST */
.list{
  padding:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  display:flex;
  gap:12px;
  align-items:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  cursor:pointer;
}

.card img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:12px;
}

.card b{
  color:#ff8c2a;
}

/* SHEET */
.sheet{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:16px;
  transform:translateY(100%);
  transition:0.3s;
  box-shadow:0 -10px 30px rgba(0,0,0,0.2);
}

.sheet.show{
  transform:translateY(0);
}

input[type=range]{
  width:100%;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#ff8c2a;
  color:#fff;
  font-weight:800;
}

/* SUCCESS */
.success{
  position:absolute;
  inset:0;
  background:#f5f5f7;
  display:none;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.check{
  font-size:110px;
  color:#ff8c2a;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:6px;
  height:10px;
  background:#ff8c2a;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(120vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="phone">
<div class="screen">

  <div class="topbar">iPhone Store</div>

  <div class="list">

    <div class="card" onclick="openSheet('iPhone 17')">
      <img src="https://images.unsplash.com/photo-1695048133142-1c1d7b5e3c9a?w=500">
      <div><b>iPhone 17</b><br>New generation</div>
    </div>

    <div class="card" onclick="openSheet('iPhone 17 Pro')">
      <img src="https://images.unsplash.com/photo-1695653420142-5f7a9a1b3a7d?w=500">
      <div><b>iPhone 17 Pro</b><br>Pro performance</div>
    </div>

    <div class="card" onclick="openSheet('iPhone 17 Pro Max')">
      <img src="https://images.unsplash.com/photo-1695653420142-5f7a9a1b3a7d?w=500">
      <div><b>iPhone 17 Pro Max</b><br>Maximum power</div>
    </div>

  </div>

  <!-- SHEET -->
  <div class="sheet" id="sheet">
    <h3 id="title"></h3>

    <p>Select credit term</p>

    <input id="slider" type="range" min="0" max="12" value="6">
    <p><b><span id="val">6</span> months</b></p>

    <button onclick="confirm()">CONFIRM</button>
  </div>

  <!-- SUCCESS -->
  <div class="success" id="success">
    <div class="check">✔</div>
  </div>

</div>
</div>

<script>
function openSheet(name){
  document.getElementById("title").innerText = name;
  document.getElementById("sheet").classList.add("show");
}

document.getElementById("slider").oninput = function(){
  document.getElementById("val").innerText = this.value;
};

function confirm(){
  document.getElementById("sheet").classList.remove("show");
  document.getElementById("success").style.display = "flex";

  for(let i=0;i<200;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDuration = (2+Math.random()*3)+"s";
    document.getElementById("success").appendChild(c);
  }
}
</script>

</body>
</html>
