<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RideX Pro Ad</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#000;
color:white;
}

.phase{
position:absolute;
inset:0;
display:none;
}

/* ---------- PHASE 1 ---------- */
.slide{
position:absolute;
right:-200px;
top:50%;
transform:translateY(-50%);
width:180px;
height:320px;
background:#111;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
animation:move 2.2s forwards;
box-shadow:0 0 40px var(--c);
}

@keyframes move{
0%{right:-200px;opacity:0}
30%{opacity:1}
70%{right:50%;transform:translateY(-50%) scale(1.1)}
100%{right:120%;opacity:0}
}

.caption{
position:absolute;
bottom:-30px;
font-size:12px;
opacity:.7;
}

.bar{
position:absolute;
top:10px;
left:10px;
right:10px;
height:3px;
background:#222;
}

.bar span{
display:block;
height:100%;
background:#4a9acc;
animation:load 2.2s linear;
}

@keyframes load{from{width:0}to{width:100%}}

/* ---------- PHASE 2 ---------- */
.browser{
width:90%;
max-width:900px;
margin:40px auto;
background:#111;
border-radius:15px;
overflow:hidden;
}

.top{
display:flex;
padding:10px;
background:#1a1a1a;
}

.dot{width:10px;height:10px;border-radius:50%;margin-right:6px}
.red{background:red}
.yellow{background:yellow}
.green{background:lime}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:20px;
}

.card{
background:#222;
padding:20px;
border-radius:10px;
text-align:center;
}

.btn{
margin-top:10px;
background:green;
border:none;
padding:8px;
color:white;
border-radius:8px;
}

/* ---------- PHASE 3 ---------- */
.success{
font-size:80px;
text-align:center;
margin-top:120px;
}

.road{
position:absolute;
bottom:0;
height:100px;
width:100%;
background:#111;
display:none;
}

.lines{
height:100%;
background:repeating-linear-gradient(90deg,#fff 0 20px,transparent 20px 40px);
opacity:.2;
animation:moveRoad 1s linear infinite;
}

@keyframes moveRoad{
from{transform:translateX(0)}
to{transform:translateX(-40px)}
}
</style>
</head>

<body>

<!-- PHASE 1 -->
<div class="phase" id="p1"></div>

<!-- PHASE 2 -->
<div class="phase" id="p2">
<div class="browser">
<div class="top">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>

<div class="grid">
<div class="card">iPhone 17<button class="btn" onclick="buy()">Add</button></div>
<div class="card">iPhone 17 Pro<button class="btn" onclick="buy()">Add</button></div>
<div class="card">iPhone 16 Pro<button class="btn" onclick="buy()">Add</button></div>
<div class="card">iPhone 16<button class="btn" onclick="buy()">Add</button></div>
</div>

</div>
</div>

<!-- PHASE 3 -->
<div class="phase" id="p3">
<div class="success">✔</div>
<div class="road"><div class="lines"></div></div>
</div>

<script>

let p1=document.getElementById("p1");
let p2=document.getElementById("p2");
let p3=document.getElementById("p3");

let count=0;

function start(){

p1.style.display="block";

const phones=["17 Pro","17","17 Max","16 Pro"];

phones.forEach((t,i)=>{
setTimeout(()=>{
let d=document.createElement("div");
d.className="slide";
d.style.setProperty("--c",["#4a9acc","#ff5f57","#28c840","#febc2e"][i]);

d.innerHTML=`
<div class="bar"><span></span></div>
<h3>iPhone ${t}</h3>
<div class="caption">Premium Device</div>
`;

p1.appendChild(d);
},i*2200);
});

setTimeout(()=>{
p1.style.display="none";
p2.style.display="block";
},9000);
}

function buy(){
count++;
}

function checkout(){
p2.style.display="none";
p3.style.display="block";
document.querySelector(".road").style.display="block";
}

start();

setTimeout(checkout,14000);

</script>

</body>
</html>
