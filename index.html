<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iPhone Credit</title>

<style>
body{
  margin:0;
  background:#dcd2c2;
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:20px;
}

/* PHONE MOCKUP */
.phone{
  width:360px;
  height:720px;
  background:#1b2a41;
  border-radius:40px;
  padding:18px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  overflow:hidden;
  position:relative;
}

/* SCREEN */
.screen{
  background:#e9e1d4;
  width:100%;
  height:100%;
  border-radius:28px;
  overflow:auto;
}

/* HEADER */
header{
  text-align:center;
  padding:14px;
  font-weight:800;
  color:#ff8c2a;
  background:#1b2a41;
}

/* CARDS */
.card{
  margin:12px;
  padding:12px;
  background:#2b3f5c;
  color:#fff;
  border-radius:14px;
  display:flex;
  gap:12px;
  align-items:center;
  cursor:pointer;
}

.card img{
  width:80px;
  height:80px;
  border-radius:10px;
  object-fit:cover;
  border:2px solid #ff8c2a;
}

.card b{
  color:#ff8c2a;
}

/* MODAL */
#modal{
  display:none;
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.box{
  background:#e9e1d4;
  width:85%;
  padding:15px;
  border-radius:14px;
  text-align:center;
}

h3{
  color:#ff8c2a;
}

input{
  width:100%;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff8c2a;
  color:#fff;
  font-weight:800;
}

/* SUCCESS */
#success{
  display:none;
  position:absolute;
  inset:0;
  background:#1b2a41;
  justify-content:center;
  align-items:center;
}

.check{
  font-size:110px;
  color:#ff8c2a;
}
</style>
</head>

<body>

<div class="phone">
  <div class="screen">

    <header>BUY iPHONE — CREDIT</header>

    <div class="card" onclick="openModal('iPhone 17','images/iphone17.jpg')">
      <img src="images/iphone17.jpg">
      <div>
        <b>iPhone 17</b><br>
        New generation
      </div>
    </div>

    <div class="card" onclick="openModal('iPhone 17 Pro','images/iphone17pro.jpg')">
      <img src="images/iphone17pro.jpg">
      <div>
        <b>iPhone 17 Pro</b><br>
        Premium design
      </div>
    </div>

    <div class="card" onclick="openModal('iPhone 17 Pro Max','images/iphone17promax.jpg')">
      <img src="images/iphone17promax.jpg">
      <div>
        <b>iPhone 17 Pro Max</b><br>
        Max performance
      </div>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal">
    <div class="box">
      <h3 id="title"></h3>

      <p>Term (months)</p>
      <input id="slider" type="range" min="0" max="12" value="6">
      <p><span id="val">6</span></p>

      <button onclick="confirm()">CONFIRM</button>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="success">
    <div class="check">✔</div>
  </div>
</div>

<script>
function openModal(name){
  document.getElementById("title").innerText = name;
  document.getElementById("modal").style.display = "flex";
}

document.getElementById("slider").oninput = function(){
  document.getElementById("val").innerText = this.value;
};

function confirm(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("success").style.display = "flex";
}
</script>

</body>
</html>
