<script>
function openModal(name){
  document.getElementById("title").innerText = name;
  document.getElementById("modal").style.display = "flex";
}

document.getElementById("slider").oninput = function(){
  document.getElementById("val").innerText = this.value;
};

function confirm(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("success").style.display = "flex";

  startConfetti();
}

/* 🔥 БАГАТО КОНФЕТІ + ПОСТІЙНО */
function startConfetti(){
  for(let i=0;i<200;i++){
    let el = document.createElement("div");
    el.style.position = "absolute";
    el.style.width = "8px";
    el.style.height = "12px";
    el.style.background = "#ff8c2a";
    el.style.left = Math.random()*100 + "vw";
    el.style.top = "-20px";
    el.style.opacity = Math.random();
    el.style.animation = fall ${2 + Math.random()*3}s linear forwards;

    document.getElementById("success").appendChild(el);
  }
}
</script>
