<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iPhone Credit</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e9e1d4;
  color:#1b2a41;
}

/* HEADER */
header{
  text-align:center;
  padding:18px;
  font-weight:800;
  background:#1b2a41;
  color:#ff8c2a;
  font-size:18px;
}

/* PRODUCTS */
.container{
  padding:12px;
}

.card{
  background:#2b3f5c;
  color:#fff;
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
  cursor:pointer;
}

.card img{
  width:85px;
  height:85px;
  object-fit:cover;
  border-radius:10px;
  border:2px solid #ff8c2a;
}

.card b{
  color:#ff8c2a;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(27,42,65,0.9);
  justify-content:center;
  align-items:center;
}

.box{
  background:#e9e1d4;
  padding:18px;
  border-radius:14px;
  width:85%;
  text-align:center;
  color:#1b2a41;
}

h3{
  color:#ff8c2a;
}

input{
  width:100%;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff8c2a;
  color:#fff;
  font-weight:800;
  margin-top:10px;
}

/* SUCCESS */
#success{
  display:none;
  position:fixed;
  inset:0;
  background:#1b2a41;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* CHECK */
.check{
  font-size:100px;
  color:#ff8c2a;
  z-index:2;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:6px;
  height:10px;
  background:#ff8c2a;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(120vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<header>BUY iPHONE — CREDIT OFFER</header>

<div class="container">

  <div class="card" onclick="openModal('iPhone 17')">
    <img src="https://images.unsplash.com/photo-1695048133142-1c1d7b5e3c9a?w=500">
    <div>
      <b>iPhone 17</b><br>
      New generation device
    </div>
  </div>

  <div class="card" onclick="openModal('iPhone 17 Pro')">
    <img src="https://images.unsplash.com/photo-1695653420142-5f7a9a1b3a7d?w=500">
    <div>
      <b>iPhone 17 Pro</b><br>
      Titanium premium design
    </div>
  </div>

  <div class="card" onclick="openModal('iPhone 17 Pro Max')">
    <img src="https://images.unsplash.com/photo-1695653420142-5f7a9a1b3a7d?w=500">
    <div>
      <b>iPhone 17 Pro Max</b><br>
      Maximum performance
    </div>
  </div>

</div>

<!-- MODAL -->
<div id="modal">
  <div class="box">
    <h3 id="title"></h3>

    <p>Select credit term (months)</p>

    <input id="slider" type="range" min="0" max="12" value="6">
    <p><span id="val">6</span> months</p>

    <button onclick="confirm()">CONFIRM OFFER</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="success">
  <div class="check">✔</div>
</div>

<script>
function openModal(name){
  document.getElementById("title").innerText = name;
  document.getElementById("modal").style.display = "flex";
}

document.getElementById("slider").oninput = function(){
  document.getElementById("val").innerText = this.value;
};

function confirm(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("success").style.display = "flex";

  /* BIG CONFETTI */
  for(let i=0;i<200;i++){
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDuration = (2+Math.random()*3)+"s";
    document.getElementById("success").appendChild(c);
  }
}
</script>

</body>
</html>
